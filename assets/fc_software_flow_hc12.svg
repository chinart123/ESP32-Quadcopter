<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1820" font-family="Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#374151"/>
  </marker>
  <marker id="arr_b" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#2563EB"/>
  </marker>
  <marker id="arr_g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#16A34A"/>
  </marker>
  <marker id="arr_r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#DC2626"/>
  </marker>
  <marker id="arr_o" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#D97706"/>
  </marker>
  <filter id="sh" x="-4%" y="-4%" width="108%" height="108%">
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
  </filter>
</defs>
<rect width="800" height="1820" fill="#F4F5F8"/>
<rect x="0" y="0" width="800" height="54" fill="#1F2937"/>
<text x="400" y="22" text-anchor="middle" font-size="14" fill="white" font-weight="bold">FC Software Flow -- Platform A: ESP32-S3 Supermini</text>
<text x="400" y="41" text-anchor="middle" font-size="9" fill="#9CA3AF" font-weight="normal">Xu ly PWM tu WeAct ELRS Mini RX V1 via attachInterrupt()</text>
<rect x="8" y="62" width="784" height="28" rx="6" fill="#1E3A8A" stroke="#1E3A8A"/>
<text x="400" y="81" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ISR SECTION -- chay tren tat ca 6 chan khi co canh CHANGE</text>
<rect x="250" y="98" width="300" height="40" rx="20" fill="#1F2937" stroke="#374151" stroke-width="2" />
<text x="400" y="123" text-anchor="middle" font-size="11" fill="white" font-weight="bold">WeAct ELRS PWM -&gt; CHANGE Interrupt</text>
<line x1="400" y1="138" x2="400" y2="160" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="160" width="270" height="36" rx="8" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="183" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">digitalRead(pin) == HIGH ?</text>
<line x1="400" y1="196" x2="400" y2="214" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<polygon points="400,214 500,250 400,286 300,250" fill="#FEF9C3" stroke="#D97706" stroke-width="1.6"/>
<text x="400" y="245" text-anchor="middle" font-size="10" fill="#92400E" font-weight="bold">digitalRead</text>
<text x="400" y="259" text-anchor="middle" font-size="10" fill="#92400E" font-weight="normal">== HIGH ?</text>
<line x1="300" y1="250" x2="200" y2="250" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<text x="292" y="240" text-anchor="end" font-size="9" fill="#16A34A" font-weight="bold">Yes</text>
<rect x="50" y="224" width="138" height="40" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
<text x="119" y="240" text-anchor="middle" font-size="10" fill="#14532D" font-weight="bold">rise_time[i]</text>
<text x="119" y="256" text-anchor="middle" font-size="10" fill="#166534" font-weight="normal">= micros()</text>
<path d="M 50,250 Q 10,250 10,180 Q 10,146 250,146" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="4,2" fill="none" marker-end="url(#arr_g)"/>
<text x="4" y="165" text-anchor="end" font-size="8" fill="#16A34A" font-weight="normal">return</text>
<line x1="400" y1="286" x2="400" y2="304" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<text x="408" y="298" text-anchor="start" font-size="9" fill="#DC2626" font-weight="bold">No</text>
<rect x="265" y="304" width="270" height="36" rx="8" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="319" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">width = micros() - rise_time[i]</text>
<text x="400" y="332" text-anchor="middle" font-size="8" fill="#9CA3AF" font-weight="normal">(microseconds elapsed)</text>
<line x1="400" y1="340" x2="400" y2="358" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<polygon points="400,358 500,394 400,430 300,394" fill="#FEF9C3" stroke="#D97706" stroke-width="1.6"/>
<text x="400" y="389" text-anchor="middle" font-size="10" fill="#92400E" font-weight="bold">800 us &lt;= width</text>
<text x="400" y="403" text-anchor="middle" font-size="10" fill="#92400E" font-weight="normal">&lt;= 2200 us ?</text>
<line x1="500" y1="394" x2="640" y2="394" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<text x="506" y="384" text-anchor="start" font-size="9" fill="#DC2626" font-weight="bold">No</text>
<rect x="640" y="372" width="130" height="38" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" />
<text x="705" y="387" text-anchor="middle" font-size="10" fill="#991B1B" font-weight="bold">Discard</text>
<text x="705" y="403" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="normal">(noise)</text>
<path d="M 770,394 Q 800,394 800,146 Q 800,134 550,134" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="4,2" fill="none" marker-end="url(#arr_r)"/>
<line x1="400" y1="430" x2="400" y2="448" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<text x="408" y="442" text-anchor="start" font-size="9" fill="#16A34A" font-weight="bold">Yes</text>
<rect x="265" y="448" width="270" height="36" rx="8" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="463" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">ch_us[i] = (uint16_t) width</text>
<text x="400" y="476" text-anchor="middle" font-size="8" fill="#9CA3AF" font-weight="normal">last_pkt_ms = millis()</text>
<line x1="400" y1="484" x2="400" y2="502" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="502" width="270" height="28" rx="8" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="520" text-anchor="middle" font-size="9" fill="#374151" font-weight="normal">new_data = true  --&gt;  return from ISR</text>
<path d="M 535,516 Q 820,516 820,146 Q 820,132 550,132" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr)"/>
<text x="830" y="331" text-anchor="start" font-size="8" fill="#7C3AED" font-weight="normal">ISR loop</text>
<rect x="8" y="542" width="784" height="28" rx="6" fill="#14532D" stroke="#14532D"/>
<text x="400" y="560" text-anchor="middle" font-size="10" fill="white" font-weight="bold">MAIN LOOP -- Chay lien tuc (1 kHz timer interrupt)</text>
<rect x="60" y="570" width="680" height="600" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
<rect x="265" y="588" width="270" height="36" rx="7" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" />
<text x="400" y="611" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Kiem tra Failsafe: millis() - last_pkt_ms &gt; 500 ms?</text>
<line x1="400" y1="624" x2="400" y2="636" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="636" width="270" height="36" rx="7" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5" />
<text x="400" y="659" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Doc ch_us[0..5]: Roll Pitch Throttle Yaw AUX1 AUX2</text>
<line x1="400" y1="672" x2="400" y2="684" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="684" width="270" height="36" rx="7" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="707" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Apply rates + expo -&gt; tinh setpoints (do/s)</text>
<line x1="400" y1="720" x2="400" y2="732" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="732" width="270" height="36" rx="7" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.5" />
<text x="400" y="755" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Doc IMU qua I2C 400 kHz (MPU6050 addr 0x68)</text>
<line x1="400" y1="768" x2="400" y2="780" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="780" width="270" height="36" rx="7" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="803" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Complementary filter -&gt; Roll/Pitch/Yaw angles</text>
<line x1="400" y1="816" x2="400" y2="828" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="828" width="270" height="36" rx="7" fill="#BAE6FD" stroke="#0284C7" stroke-width="1.5" />
<text x="400" y="851" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">PID loops: Roll PID + Pitch PID + Yaw PID</text>
<line x1="400" y1="864" x2="400" y2="876" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="876" width="270" height="36" rx="7" fill="white" stroke="#9CA3AF" stroke-width="1.5" />
<text x="400" y="899" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">Mixer: tinh 4 gia tri motor thrust</text>
<line x1="400" y1="912" x2="400" y2="924" stroke="#374151" stroke-width="1.8"  marker-end="url(#arr)"/>
<rect x="265" y="924" width="270" height="36" rx="7" fill="#BAE6FD" stroke="#0284C7" stroke-width="1.5" />
<text x="400" y="947" text-anchor="middle" font-size="10" fill="#374151" font-weight="normal">LEDC PWM: ledcWrite() cho 4 kenh ESC</text>
<rect x="250" y="1180" width="300" height="44" rx="22" fill="#111827" stroke="#374151" stroke-width="2" />
<text x="400" y="1207" text-anchor="middle" font-size="12" fill="white" font-weight="bold">OUTPUT: 4x ESC + Brushless Motor</text>
<text x="400" y="1220" text-anchor="middle" font-size="8" fill="#9CA3AF" font-weight="normal">500 Hz / 4 kHz  --  2xCW + 2xCCW</text>
<path d="M 550,1202 Q 620,1202 620,600 Q 620,588 535,588" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arr)"/>
<text x="628" y="875" text-anchor="start" font-size="8" fill="#7C3AED" font-weight="normal">Main Loop</text>
<rect x="8" y="1234" width="784" height="30" rx="6" fill="#FEF3C7" stroke="#D97706"/>
<text x="400" y="1246" text-anchor="middle" font-size="8" fill="#92400E" font-weight="normal">Platform B (STM32F103): Dung USART1_IRQHandler + CRSF parser (0xC8 sync + CRC8)</text>
<text x="400" y="1260" text-anchor="middle" font-size="8" fill="#B45309" font-weight="normal">thay vi attachInterrupt(). PID loop giong het Platform A.</text>
</svg>